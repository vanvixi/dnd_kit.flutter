name: dnd_kit_workspace

environment:
  sdk: ">=3.5.0 <4.0.0"

workspace:
  - packages/dnd_kit_core
  - packages/dnd_kit
  - examples/kanban_board
  - examples/basic_drag_drop
  - examples/multi_container_sortable
  - examples/example_gallery

dev_dependencies:
  lints: ^5.0.0
  melos: ^7.8.1

melos:
  scripts:
    analyze:
      run: dart run melos exec --concurrency 1 -- "dart analyze"
    test:
      run: dart run melos exec --dir-exists test -- "dart test"
    validate:
      run: |
        dart format --set-exit-if-changed .
        dart run melos run analyze
        dart test packages/dnd_kit_core
        flutter test packages/dnd_kit
        flutter test examples/kanban_board
        flutter test examples/multi_container_sortable
        flutter test examples/example_gallery
